<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freelancing Profiles · Samiulla Mohammadi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            margin: auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, #2c3e50, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .info {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 25px;
            border-radius: 16px;
            margin: 30px 0 40px;
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.2rem;
        }

        .info-item .label {
            font-weight: 600;
            color: #2c3e50;
            background: white;
            padding: 8px 20px;
            border-radius: 40px;
        }

        .info-item .value {
            color: #34495e;
            font-weight: 500;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin: 30px 0;
            transition: all 0.3s ease;
        }

        .profile-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #edf2f7;
            position: relative;
            z-index: 1;
        }

        .image-wrapper {
            background: #f8fafc;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .profile-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 16px;
            border: 3px solid white;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: block;
        }

        /* افکت هاور روی کل گالری */
        .gallery:hover .profile-card:not(:hover) {
            opacity: 0.5;
            filter: blur(1px);
            transform: scale(0.95);
        }

        /* کارتی که هاور شده - بزرگنمایی 30% */
        .profile-card:hover {
            transform: scale(1.3) translateY(20px);
            z-index: 999;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.25);
        }

        /* عکس داخل کارت هاور شده */
        .profile-card:hover img {
            height: 280px;
            object-fit: cover;
        }

        /* اسم پلتفرم در حالت هاور */
        .profile-card:hover .profile-name {
            font-size: 1.2rem;
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .profile-name {
            padding: 15px 20px;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            background: white;
            transition: all 0.3s ease;
        }

        .profile-name::before {
            content: "📸";
            font-size: 1.2rem;
        }

        /* تنظیم موقعیت کارت‌های مختلف در هاور */
        .profile-card:nth-child(odd):hover {
            transform: scale(1.3) translateX(30px) translateY(15px);
        }

        .profile-card:nth-child(even):hover {
            transform: scale(1.3) translateX(-30px) translateY(15px);
        }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 2px dashed #cbd5e1;
        }

        .footer p {
            color: #475569;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #f1f5f9;
            padding: 12px 30px;
            border-radius: 50px;
        }

        .note {
            text-align: center;
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 12px;
            margin: 30px 0 0;
            font-size: 1rem;
        }

        @media (max-width: 900px) {
            .gallery {
                grid-template-columns: 1fr;
            }
            
            .profile-card:hover {
                transform: scale(1.1) !important;
            }
        }
    </style>
</head>
<body>

    </div>
