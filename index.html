<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelancing Profiles · Samiulla Mohammadi</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
padding:30px 15px;
display:flex;
justify-content:center;
}

.container{
max-width:1100px;
width:100%;
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:2.4rem;
color:#2c3e50;
}

.info{
display:flex;
justify-content:center;
gap:50px;
flex-wrap:wrap;
background:#f3f4f6;
padding:20px;
border-radius:12px;
margin-bottom:40px;
}

.info-item{
font-size:1.1rem;
}

.info-item .label{
font-weight:bold;
margin-right:8px;
}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:25px;
}

.profile-card{
background:#fff;
border-radius:16px;
overflow:hidden;
border:1px solid #e5e7eb;
box-shadow:0 10px 20px rgba(0,0,0,0.08);
transition:0.3s;
}

.image-wrapper{
padding:15px;
background:#f8fafc;
}

.profile-card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.profile-name{
text-align:center;
padding:14px;
font-weight:bold;
background:#fafafa;
border-top:1px solid #eee;
}

.footer{
text-align:center;
margin-top:40px;
padding-top:25px;
border-top:1px dashed #ccc;
color:#555;
}

/* Hover effect فقط برای دستگاه‌هایی که موس دارند */

@media (hover:hover){

.gallery:hover .profile-card:not(:hover){
opacity:0.5;
transform:scale(0.95);
}

.profile-card:hover{
transform:scale(1.15);
box-shadow:0 25px 40px rgba(0,0,0,0.2);
}

}

/* Tablet */

@media (max-width:900px){

.gallery{
grid-template-columns:1fr;
}

}

/* Mobile */

@media (max-width:500px){

body{
padding:15px 10px;
}

.container{
padding:20px;
}

.header h1{
font-size:1.7rem;
}

.profile-card img{
height:180px;
}

.info{
flex-direction:column;
gap:10px;
text-align:center;
}

}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Freelancing Profiles</h1>
</div>

<div class="info">

<div class="info-item">
<span class="label">Name:</span>
<span>Samiulla Mohammadi</span>
</div>

<div class="info-item">
<span class="label">Supervisor:</span>
<span>Farzad Azizi</span>
</div>

</div>

<div class="gallery">

<div class="profile-card">
<div class="image-wrapper">
<img src="img/fiverr.png" alt="Fiverr Profile">
</div>
<div class="profile-name">Fiverr</div>
</div>

<div class="profile-card">
<div class="image-wrapper">
<img src="img/freelancer.JPG" alt="Freelancer Profile">
</div>
<div class="profile-name">Freelancer</div>
</div>

<div class="profile-card">
<div class="image-wrapper">
<img src="img/guru.JPG" alt="Guru Profile">
</div>
<div class="profile-name">Guru</div>
</div>

<div class="profile-card">
<div class="image-wrapper">
<img src="img/preply.JPG" alt="Preply Profile">
</div>
<div class="profile-name">Preply</div>
</div>

<div class="profile-card">
<div class="image-wrapper">
<img src="img/superproof.JPG" alt="Superproof Profile">
</div>
<div class="profile-name">Superproof</div>
</div>

<div class="profile-card">
<div class="image-wrapper">
<img src="img/truelancer.JPG" alt="Truelancer Profile">
</div>
<div class="profile-name">Truelancer</div>
</div>

<div class="profile-card">
<div class="image-wrapper">
<img src="img/twine.JPG" alt="Twine Profile">
</div>
<div class="profile-name">Twine</div>
</div>

</div>

<div class="footer">
<p>Freelancing Profile Screenshots</p>
</div>

</div>

</body>
</html>
